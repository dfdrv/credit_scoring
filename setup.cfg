[flake8]
accept-encodings = utf-8
max-line-length = 80
exclude =
    .git,
    .venv,
    __pycache__,
    .dvc,
    data,
    artifacts,
    notebooks

[isort]
known_first_party = app
line_length = 80
src_paths = src, src/tests

[tool:pytest]
testpaths = src/tests
pythonpath = src
addopts =
    --cov=app
    --cov-report=term-missing
